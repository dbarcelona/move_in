<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lakeside Move-In Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏠 Lakeside Move-In Tracker</h1>
            <p>1 Lakeside Dr #804 • Oakland, CA • 917 sq ft</p>
        </header>

        <!-- Navigation Tabs -->
        <div class="tabs">
            <button class="tab-button active" onclick="showTab('todo')">📋 To-Do List</button>
            <button class="tab-button" onclick="showTab('planner')">🏡 Space Planner</button>
        </div>

        <!-- To-Do List Section -->
        <div id="todo-section" class="tab-content active">
            <div class="add-task-form">
                <h2>Add New Task</h2>
                <input type="text" id="task-input" placeholder="What needs to be done?">
                <select id="category-select">
                    <option value="Packing">📦 Packing</option>
                    <option value="Utilities">⚡ Utilities</option>
                    <option value="Cleaning">🧹 Cleaning</option>
                    <option value="Moving">🚚 Moving</option>
                    <option value="Shopping">🛒 Shopping</option>
                    <option value="Other">📝 Other</option>
                </select>
                <input type="date" id="due-date-input">
                <button onclick="addTask()">Add Task</button>
            </div>

            <div class="filter-section">
                <label>Filter by category:</label>
                <select id="filter-category" onchange="filterTasks()">
                    <option value="All">All Categories</option>
                    <option value="Packing">📦 Packing</option>
                    <option value="Utilities">⚡ Utilities</option>
                    <option value="Cleaning">🧹 Cleaning</option>
                    <option value="Moving">🚚 Moving</option>
                    <option value="Shopping">🛒 Shopping</option>
                    <option value="Other">📝 Other</option>
                </select>
            </div>

            <div class="tasks-container" id="tasks-list">
                <!-- Tasks will be added here dynamically -->
            </div>
        </div>

        <!-- Space Planner Section -->
        <div id="planner-section" class="tab-content">
            <div class="planner-controls">
                <h2>Floor Plan & Furniture Planner</h2>
                <p style="color: #666; margin-bottom: 15px;">Drag furniture to plan your space • Double-click to remove items</p>
                <div class="furniture-palette">
                    <button onclick="addFurniture('bed', 120, 80)">🛏️ Queen Bed</button>
                    <button onclick="addFurniture('sofa', 90, 40)">🛋️ Sofa</button>
                    <button onclick="addFurniture('loveseat', 70, 40)">🪑 Loveseat</button>
                    <button onclick="addFurniture('table', 60, 40)">🍽️ Dining Table</button>
                    <button onclick="addFurniture('desk', 50, 30)">🖥️ Desk</button>
                    <button onclick="addFurniture('chair', 30, 30)">💺 Chair</button>
                    <button onclick="addFurniture('tv', 50, 10)">📺 TV Stand</button>
                    <button onclick="addFurniture('bookshelf', 40, 15)">📚 Bookshelf</button>
                    <button onclick="addFurniture('nightstand', 25, 20)">🛏️ Nightstand</button>
                    <button onclick="addFurniture('dresser', 50, 25)">👔 Dresser</button>
                    <button onclick="clearRoom()" style="background: #ff6b6b;">🗑️ Clear All</button>
                </div>
            </div>
            <div class="floor-plan-container">
                <div id="room-canvas">
                    <!-- Floor plan and furniture will be placed here -->
                </div>
            </div>
            <div class="legend">
                <strong>Legend:</strong>
                <span class="legend-item"><span class="legend-window"></span> Windows</span>
                <span class="legend-item"><span class="legend-door"></span> Doors</span>
                <span class="legend-item"><span class="legend-wall"></span> Walls</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
